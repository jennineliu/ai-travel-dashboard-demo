                                                    <span className="text-xs font-black text-sky-400 uppercase tracking-wider">Kensington & Chelsea</span>
                                                    <span className="text-[10px] bg-amber-500/10 text-amber-400 font-bold px-2.5 py-0.5 rounded-full uppercase">Moderate</span>
                                                </div>
                                                <h4 className="text-sm font-black text-white">South Kensington, Knightsbridge</h4>
                                                <p className="text-xs text-slate-400 leading-relaxed font-semibold">
                                                    Highly targeted for **luxury asset crimes**, including theft of high-end watches outside restaurants and clubs, luxury vehicle break-ins, and sophisticated distraction scams around major museums.
                                                </p>
                                                <div className="pt-2 flex flex-wrap gap-1">
                                                    <span className="text-[9px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-0.5 rounded-md font-bold">Luxury Watch Theft</span>
                                                    <span className="text-[9px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-0.5 rounded-md font-bold">Vehicle Crime</span>
                                                </div>
                                            </div>

                                            {/* Hackney & Tower Hamlets Profile */}
                                            <div className="p-6 bg-slate-950/80 border border-sky-500/30 rounded-2xl space-y-3 hover:border-sky-400 transition-all shadow-[0_0_15px_rgba(14,165,233,0.06)] hover:shadow-[0_0_20px_rgba(14,165,233,0.2)]">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-xs font-black text-sky-400 uppercase tracking-wider">Hackney & Tower Hamlets</span>
                                                    <span className="text-[10px] bg-amber-500/10 text-amber-400 font-bold px-2.5 py-0.5 rounded-full uppercase">Moderate-High</span>
                                                </div>
                                                <h4 className="text-sm font-black text-white">Shoreditch, Brick Lane, Whitechapel</h4>
                                                <p className="text-xs text-slate-400 leading-relaxed font-semibold">
                                                    Dense nightlife venues see high rates of **opportunistic smartphone theft** from tables and bars. Shoreditch and Brick Lane corridor areas experience elevated frequencies of bike theft and moped-assisted snatchings.
                                                </p>
                                                <div className="pt-2 flex flex-wrap gap-1">
                                                    <span className="text-[9px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-0.5 rounded-md font-bold">Opportunistic Theft</span>
                                                    <span className="text-[9px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-0.5 rounded-md font-bold">Bicycle Snatch</span>
                                                </div>
                                            </div>

                                            {/* Islington Profile */}
                                            <div className="p-6 bg-slate-950/80 border border-sky-500/30 rounded-2xl space-y-3 hover:border-sky-400 transition-all shadow-[0_0_15px_rgba(14,165,233,0.06)] hover:shadow-[0_0_20px_rgba(14,165,233,0.2)]">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-xs font-black text-sky-400 uppercase tracking-wider">Islington</span>
                                                    <span className="text-[10px] bg-slate-800 text-slate-400 font-bold px-2.5 py-0.5 rounded-full uppercase">Moderate</span>
                                                </div>
                                                <h4 className="text-sm font-black text-white">Angel, Upper Street, Finsbury Park</h4>
                                                <p className="text-xs text-slate-400 leading-relaxed font-semibold">
                                                    Major transit corridors suffer from **e-scooter/e-bike phone grabs** near busy tube exits. Residential street edges are prone to vehicle-related break-ins and opportunistic bicycle thefts.
                                                </p>
                                                <div className="pt-2 flex flex-wrap gap-1">
                                                    <span className="text-[9px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-0.5 rounded-md font-bold">Transit Path Snatch</span>
                                                    <span className="text-[9px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-0.5 rounded-md font-bold">Bicycle Theft</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Risk Map Panel */}
                                {activeTab === 'riskmap' && (
                                    <div className="w-full rounded-3xl overflow-hidden border border-slate-800 bg-slate-950 shadow-inner">
                                        <div className="p-4 bg-slate-950 border-b border-slate-850 flex justify-between items-center flex-wrap gap-2">
                                            <div className="text-xs font-black tracking-tight text-slate-400 flex items-center gap-1.5">
                                                <Icon name="Map" className="w-3.5 h-3.5 text-sky-400" />
                                                Risk Map
                                            </div>
                                            <span className="text-[10px] uppercase font-bold text-slate-500">Source: Demo</span>
                                        </div>
                                        <iframe 
                                            src="https://www.google.com/maps/d/embed?mid=1b0JNufCSBmiavjQ_uUh4lIuuz0z0OBI" 
                                            width="100%" 
                                            height="450" 
                                            className="border-0 w-full h-[450px] rounded-b-3xl block" 
                                            allowFullScreen 
                                            loading="lazy"
                                        ></iframe>
                                    </div>
                                )}

                                {/* Emergency Contacts Panel */}
                                {activeTab === 'contacts' && (
                                    <div className="space-y-6 animate-in fade-in duration-500 text-left">
                                        <div>
                                            <h3 className="text-lg font-black tracking-tight text-white">Emergency Services & Critical Response</h3>
                                            <p className="text-xs text-slate-500 font-semibold">Immediate telephonic link keys. Always tap to dial directly.</p>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {emergencyContacts.map((c, i) => (
                                                <a 
                                                    key={i} 
                                                    href={`tel:${c.num.replace(/\s+/g, '')}`} 
                                                    className="group p-5 bg-slate-950 border border-slate-850 rounded-2xl hover:bg-slate-900/60 hover:border-sky-500/30 transition-all flex flex-col justify-between h-[160px] shadow-sm"
                                                >
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-[10px] font-black uppercase tracking-wider text-slate-500 group-hover:text-sky-400 transition-colors">{c.type}</span>
                                                        <div className="p-1.5 bg-slate-900 border border-slate-800 rounded-lg group-hover:bg-sky-500/10 transition-colors">
                                                            <Icon name={c.icon} className="w-4 h-4 text-slate-400 group-hover:text-sky-400" />
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <div className="text-2xl font-black text-white font-mono tracking-tighter group-hover:text-sky-400">{c.num}</div>
                                                        <div className="text-xs font-black text-slate-100 mt-1">{c.name}</div>
                                                        <p className="text-[10px] text-slate-500 leading-snug font-semibold mt-0.5">{c.desc}</p>
                                                    </div>
                                                </a>
                                            ))}
                                        </div>
                                        <div className="p-4 bg-slate-950 rounded-2xl border border-slate-850 flex flex-col sm:flex-row items-center justify-between gap-4">
                                            <div className="flex items-center gap-3">
                                                <div className="p-2 bg-emerald-500/15 rounded-xl border border-emerald-500/20 text-emerald-400">
                                                    <Icon name="Activity" className="w-5 h-5" />
                                                </div>
                                                <div className="text-left">
                                                    <div className="text-xs font-bold text-white">Smart Traveler Enrollment Program (STEP)</div>
                                                    <p className="text-[10px] text-slate-400 font-semibold leading-relaxed">Enroll with the US State Department to receive localized real-time embassy advisory alerts during your trip.</p>
                                                </div>
                                            </div>
                                            <a 
                                                href="https://step.state.gov/" 
                                                target="_blank" 
                                                rel="noopener noreferrer" 
                                                className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-xs font-black uppercase tracking-wider text-white rounded-xl transition-all"
                                            >
                                                Register with STEP
                                            </a>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    <footer className="p-10 sm:p-16 border-t border-slate-900 mt-16 bg-slate-950 text-left">
                        <div className="max-w-4xl mx-auto space-y-8">
                            <p className="text-slate-400 text-[10px] sm:text-xs font-black uppercase tracking-[0.3em]">Last Update Ref: {currentDate}</p>
                            <div className="text-slate-600 text-[10px] sm:text-[11px] leading-relaxed max-w-2xl mx-auto font-medium px-4">
                                <p className="mb-4 text-left"><span className="text-slate-500 font-black uppercase tracking-widest mr-2">Disclaimer:</span> This dashboard is for demonstration purposes only. All information, alerts, maps, and advisories displayed are simulated to showcase platform capabilities and do not constitute real-time security directives, official legal counsel, or immediate emergency dispatch coordination.</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        window.onload = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
