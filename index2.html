                                <p class="text-xs text-slate-400 leading-relaxed font-semibold">${service.desc}</p>
                                <div class="pt-2 border-t border-slate-900">
                                    <span class="text-[10px] uppercase font-black tracking-wider text-amber-500 block mb-1">Safety Advisory Protocol</span>
                                    <p class="text-[11px] text-slate-300 leading-relaxed font-medium">${service.tips}</p>
                                </div>
                            </div>
                        `).join("")}
                    </div>

                    <div class="pt-6 border-t border-slate-800/50">
                        <h4 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-4">Core Ticketing & Transit Rules</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div class="p-4 bg-slate-950 rounded-2xl border border-slate-850">
                                <div class="text-xs font-bold text-white mb-1 flex items-center gap-1.5">
                                    ${icon("creditCard", "w-3.5 h-3.5", "#38bdf8")} Cashless Network
                                </div>
                                <p class="text-[11px] text-slate-400 font-semibold leading-relaxed">
                                    London's entire public transport network is completely cash-free. You cannot buy bus tickets or Tube fares using physical currency.
                                </p>
                            </div>
                            <div class="p-4 bg-slate-950 rounded-2xl border border-slate-850">
                                <div class="text-xs font-bold text-white mb-1 flex items-center gap-1.5">
                                    ${icon("smartphone", "w-3.5 h-3.5", "#f59e0b")} Easy Pay Methods
                                </div>
                                <p class="text-[11px] text-slate-400 font-semibold leading-relaxed">
                                    Simply tap your contactless credit or debit card, phone, or smartwatch over yellow readers at station barriers and bus boarding points.
                                </p>
                            </div>
                            <div class="p-4 bg-slate-950 rounded-2xl border border-slate-850">
                                <div class="text-xs font-bold text-white mb-1 flex items-center gap-1.5">
                                    ${icon("ticket", "w-3.5 h-3.5", "#34d399")} Oyster Cards
                                </div>
                                <p class="text-[11px] text-slate-400 font-semibold leading-relaxed">
                                    Alternatively, purchase a physical Oyster Card at station terminals. Always remember to tap in and tap out to avoid penalty fares.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBoroughsPanel() {
            return `
                <div class="max-w-6xl space-y-6 animate-in fade-in duration-500 text-left">
                    <div>
                        <h3 class="text-lg font-black tracking-tight text-white">Borough Crime & Safety Profiles</h3>
                        <p class="text-xs text-slate-500 font-semibold">Historical and tactical security profiles of key central London zones (Source: Demo).</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${boroughProfiles.map((profile) => `
                            <div class="p-6 bg-slate-950/80 border border-sky-500/30 rounded-2xl space-y-3 hover:border-sky-400 transition-all shadow-[0_0_15px_rgba(14,165,233,0.06)] hover:shadow-[0_0_20px_rgba(14,165,233,0.2)]">
                                <div class="flex items-center justify-between gap-3">
                                    <span class="text-xs font-black text-sky-400 uppercase tracking-wider">${profile.borough}</span>
                                    <span class="text-[10px] ${profile.riskClass} font-bold px-2.5 py-0.5 rounded-full uppercase">${profile.risk}</span>
                                </div>
                                <h4 class="text-sm font-black text-white">${profile.title}</h4>
                                <p class="text-xs text-slate-400 leading-relaxed font-semibold">${profile.description}</p>
                                <div class="pt-2 flex flex-wrap gap-1">
                                    ${profile.tags.map((tag) => `
                                        <span class="text-[9px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-0.5 rounded-md font-bold">${tag}</span>
                                    `).join("")}
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>
            `;
        }

        function renderRiskMapPanel() {
            return `
                <div class="w-full rounded-3xl overflow-hidden border border-slate-800 bg-slate-950 shadow-inner">
                    <div class="p-4 bg-slate-950 border-b border-slate-850 flex justify-between items-center flex-wrap gap-2">
                        <div class="text-xs font-black tracking-tight text-slate-400 flex items-center gap-1.5">
                            ${icon("map", "w-3.5 h-3.5", "#38bdf8")} Risk Map
                        </div>
                        <span class="text-[10px] uppercase font-bold text-slate-500">Source: Demo</span>
                    </div>
                    <iframe
                        src="https://www.google.com/maps/d/embed?mid=1b0JNufCSBmiavjQ_uUh4lIuuz0z0OBI"
                        width="100%"
                        height="450"
                        class="border-0 w-full h-[450px] rounded-b-3xl block"
                        allowfullscreen
                        loading="lazy"
                    ></iframe>
                </div>
            `;
        }

        function renderContactsPanel() {
            return `
                <div class="space-y-6 animate-in fade-in duration-500 text-left">
                    <div>
                        <h3 class="text-lg font-black tracking-tight text-white">Emergency Services & Critical Response</h3>
                        <p class="text-xs text-slate-500 font-semibold">Immediate telephonic link keys. Always tap to dial directly.</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        ${emergencyContacts.map((contact) => `
                            <a
                                href="tel:${contact.num.replace(/[^\d+]/g, "")}"
                                class="group p-5 bg-slate-950 border border-slate-850 rounded-2xl hover:bg-slate-900/60 hover:border-sky-500/30 transition-all flex flex-col justify-between h-[160px] shadow-sm"
                            >
                                <div class="flex items-center justify-between">
                                    <span class="text-[10px] font-black uppercase tracking-wider text-slate-500 group-hover:text-sky-400 transition-colors">${contact.type}</span>
                                    <div class="p-1.5 bg-slate-900 border border-slate-800 rounded-lg group-hover:bg-sky-500/10 transition-colors">
                                        ${icon(contact.icon, "w-4 h-4", contact.accent)}
                                    </div>
                                </div>
                                <div>
                                    <div class="text-2xl font-black text-white font-mono tracking-tighter group-hover:text-sky-400">${contact.num}</div>
                                    <div class="text-xs font-black text-slate-100 mt-1">${contact.name}</div>
                                    <p class="text-[10px] text-slate-500 leading-snug font-semibold mt-0.5">${contact.desc}</p>
                                </div>
                            </a>
                        `).join("")}
                    </div>
                    <div class="p-4 bg-slate-950 rounded-2xl border border-slate-850 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-emerald-500/15 rounded-xl border border-emerald-500/20 text-emerald-400">
                                ${icon("compass", "w-5 h-5", "#34d399")}
                            </div>
                            <div class="text-left">
                                <div class="text-xs font-bold text-white">Smart Traveler Enrollment Program (STEP)</div>
                                <p class="text-[10px] text-slate-400 font-semibold leading-relaxed">Enroll with the U.S. State Department to receive localized real-time embassy advisory alerts during your trip.</p>
                            </div>
                        </div>
                        <a
                            href="https://step.state.gov/"
                            target="_blank"
                            rel="noopener noreferrer"
                            class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-xs font-black uppercase tracking-wider text-white rounded-xl transition-all"
                        >
                            Register with STEP
                        </a>
                    </div>
                </div>
            `;
        }

        function bindEvents() {
            document.querySelectorAll("[data-risk-id]").forEach((button) => {
                button.addEventListener("click", () => renderSelectedRisk(button.dataset.riskId));
            });

            document.querySelectorAll("[data-tab-id]").forEach((button) => {
                button.addEventListener("click", () => renderTab(button.dataset.tabId));
            });
        }

        function updateLondonTime() {
            const londonTime = new Date().toLocaleTimeString("en-GB", {
                timeZone: "Europe/London",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: true
            });
            const timeNode = document.getElementById("london-time");
            if (timeNode) {
                timeNode.textContent = londonTime;
            }
        }

        async function syncExternalData() {
            const weatherNode = document.getElementById("weather-temp");
            const weatherIcon = document.getElementById("weather-icon");
            const fxNode = document.getElementById("fx-rate");

            try {
                const weatherResponse = await fetch("https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&current_weather=true");
                const weatherData = await weatherResponse.json();
                if (weatherData && weatherData.current_weather && weatherNode && weatherIcon) {
                    const temp = Math.round(weatherData.current_weather.temperature);
                    weatherNode.textContent = temp + " C";
                    weatherIcon.innerHTML = temp > 18
                        ? icon("sun", "w-4 h-4", "#f59e0b")
                        : icon("cloud", "w-4 h-4", "#94a3b8");
                }
            } catch (error) {
                if (weatherNode) {
                    weatherNode.textContent = "Unavailable";
                }
            }

            try {
                const fxResponse = await fetch("https://api.frankfurter.dev/v1/latest?from=GBP&to=USD");
                const fxData = await fxResponse.json();
                if (fxData && fxData.rates && typeof fxData.rates.USD === "number" && fxNode) {
                    fxNode.textContent = "GBP 1 = USD " + fxData.rates.USD.toFixed(2);
                } else if (fxNode) {
                    fxNode.textContent = "Unavailable";
                }
            } catch (error) {
                if (fxNode) {
                    fxNode.textContent = "Unavailable";
                }
            }
        }

        document.addEventListener("DOMContentLoaded", renderApp);
    </script>
</body>
</html>
